<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>土津神社 勤怠管理</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;700&family=Noto+Sans+JP:wght@400;500;700&display=swap');

  :root {
    --vermilion: #C0392B;
    --deep-red: #8B1A1A;
    --gold: #C9A84C;
    --gold-light: #F0D080;
    --ink: #1A1208;
    --paper: #FAF6EE;
    --paper-dark: #F0E8D8;
    --shadow: rgba(26,18,8,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* 背景の和紙テクスチャ */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(180,150,80,0.08) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(180,150,80,0.05) 40px);
    pointer-events: none;
    z-index: 0;
  }

  /* ヘッダー */
  header {
    background: linear-gradient(135deg, var(--deep-red) 0%, var(--vermilion) 60%, #D44 100%);
    padding: 18px 24px 14px;
    display: flex;
    align-items: center;
    gap: 14px;
    box-shadow: 0 4px 20px rgba(139,26,26,0.4);
    position: relative;
    z-index: 10;
  }

  header::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--gold), var(--gold-light), var(--gold));
  }

  .shrine-mark {
    font-size: 32px;
    color: var(--gold-light);
    line-height: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }

  .header-text h1 {
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: var(--gold-light);
    letter-spacing: 0.12em;
    text-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  .header-text p {
    font-size: 11px;
    color: rgba(240,208,128,0.7);
    letter-spacing: 0.08em;
    margin-top: 2px;
  }

  /* 時計 */
  .clock-bar {
    background: var(--ink);
    padding: 10px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: relative;
    z-index: 9;
  }

  .clock-time {
    font-family: 'Noto Serif JP', serif;
    font-size: 28px;
    color: var(--gold-light);
    letter-spacing: 0.05em;
  }

  .clock-date {
    font-size: 12px;
    color: rgba(240,208,128,0.6);
    letter-spacing: 0.1em;
  }

  /* メインコンテンツ */
  main {
    flex: 1;
    padding: 20px 16px;
    position: relative;
    z-index: 1;
  }

  .section-label {
    font-family: 'Noto Serif JP', serif;
    font-size: 13px;
    color: var(--deep-red);
    letter-spacing: 0.15em;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--gold), transparent);
  }

  /* 職員グリッド */
  .staff-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .staff-btn {
    background: white;
    border: 2px solid var(--paper-dark);
    border-radius: 12px;
    padding: 16px 12px;
    cursor: pointer;
    transition: all 0.18s ease;
    text-align: center;
    box-shadow: 0 2px 8px var(--shadow);
    position: relative;
    overflow: hidden;
  }

  .staff-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(201,168,76,0.1), transparent);
    opacity: 0;
    transition: opacity 0.18s;
  }

  .staff-btn:hover { 
    border-color: var(--gold);
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
  }

  .staff-btn:hover::before { opacity: 1; }

  .staff-btn.selected {
    border-color: var(--vermilion);
    background: linear-gradient(135deg, #fff5f5, white);
    box-shadow: 0 4px 16px rgba(192,57,43,0.2);
  }

  .staff-avatar {
    width: 48px;
    height: 48px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold), var(--deep-red));
    margin: 0 auto 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif JP', serif;
    font-size: 18px;
    color: white;
    font-weight: 700;
  }

  .staff-btn.selected .staff-avatar {
    background: linear-gradient(135deg, var(--vermilion), var(--deep-red));
    box-shadow: 0 2px 8px rgba(192,57,43,0.4);
  }

  .staff-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: 0.05em;
  }

  .staff-status {
    font-size: 10px;
    margin-top: 4px;
    color: #999;
  }

  .staff-status.in { color: #27ae60; font-weight: 700; }
  .staff-status.out { color: #e74c3c; }

  /* 打刻パネル */
  .punch-panel {
    background: white;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 4px 20px var(--shadow);
    border: 1px solid var(--paper-dark);
    margin-bottom: 16px;
    display: none;
  }

  .punch-panel.active { display: block; }

  .punch-selected-name {
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    color: var(--ink);
    margin-bottom: 16px;
    text-align: center;
  }

  .punch-selected-name span {
    color: var(--deep-red);
  }

  .punch-btns {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .punch-in, .punch-out {
    padding: 20px;
    border: none;
    border-radius: 12px;
    font-family: 'Noto Serif JP', serif;
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: all 0.15s ease;
    position: relative;
    overflow: hidden;
  }

  .punch-in {
    background: linear-gradient(135deg, #27ae60, #2ecc71);
    color: white;
    box-shadow: 0 4px 14px rgba(39,174,96,0.35);
  }

  .punch-out {
    background: linear-gradient(135deg, var(--vermilion), #e74c3c);
    color: white;
    box-shadow: 0 4px 14px rgba(192,57,43,0.35);
  }

  .punch-in:active { transform: scale(0.97); }
  .punch-out:active { transform: scale(0.97); }

  .punch-sub {
    display: block;
    font-size: 11px;
    opacity: 0.85;
    font-family: 'Noto Sans JP', sans-serif;
    margin-top: 4px;
    font-weight: 400;
  }

  .cancel-btn {
    width: 100%;
    margin-top: 10px;
    padding: 10px;
    background: none;
    border: 1px solid var(--paper-dark);
    border-radius: 8px;
    color: #999;
    font-size: 12px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* 最近の打刻ログ */
  .log-list {
    background: white;
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 10px var(--shadow);
  }

  .log-item {
    display: flex;
    align-items: center;
    padding: 10px 16px;
    border-bottom: 1px solid var(--paper-dark);
    gap: 12px;
    animation: slideIn 0.3s ease;
  }

  .log-item:last-child { border-bottom: none; }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-badge {
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    min-width: 44px;
    text-align: center;
  }

  .log-badge.in { background: #e8f8ee; color: #27ae60; }
  .log-badge.out { background: #fdf0ee; color: var(--vermilion); }

  .log-name { font-size: 13px; font-weight: 700; color: var(--ink); flex: 1; }
  .log-time { font-size: 12px; color: #999; font-variant-numeric: tabular-nums; }

  /* トースト */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--ink);
    color: var(--gold-light);
    padding: 14px 28px;
    border-radius: 50px;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.05em;
    z-index: 100;
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space: nowrap;
    border: 1px solid var(--gold);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* 設定モーダル */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.6);
    z-index: 50;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--paper);
    border-radius: 16px;
    padding: 24px;
    width: 100%;
    max-width: 480px;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    border: 1px solid var(--gold);
  }

  .modal h2 {
    font-family: 'Noto Serif JP', serif;
    font-size: 16px;
    color: var(--deep-red);
    margin-bottom: 20px;
    letter-spacing: 0.1em;
  }

  .form-group { margin-bottom: 16px; }

  .form-group label {
    display: block;
    font-size: 12px;
    color: var(--deep-red);
    margin-bottom: 6px;
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .form-group input, .form-group textarea {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--paper-dark);
    border-radius: 8px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 13px;
    color: var(--ink);
    background: white;
    outline: none;
    transition: border-color 0.15s;
  }

  .form-group input:focus, .form-group textarea:focus {
    border-color: var(--gold);
  }

  .form-group textarea { resize: vertical; min-height: 80px; }

  .modal-btns { display: flex; gap: 10px; margin-top: 20px; }

  .btn-primary {
    flex: 1;
    padding: 12px;
    background: linear-gradient(135deg, var(--deep-red), var(--vermilion));
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    letter-spacing: 0.05em;
  }

  .btn-secondary {
    padding: 12px 20px;
    background: none;
    border: 1px solid var(--paper-dark);
    border-radius: 8px;
    font-size: 13px;
    color: #999;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
  }

  /* 設定ボタン */
  .settings-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: var(--ink);
    border: 1px solid var(--gold);
    color: var(--gold-light);
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 40;
    box-shadow: 0 4px 14px rgba(0,0,0,0.3);
  }

  /* 送信中オーバーレイ */
  .sending-overlay {
    position: fixed;
    inset: 0;
    background: rgba(26,18,8,0.5);
    z-index: 80;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }

  .sending-overlay.active { display: flex; }

  .spinner {
    width: 48px;
    height: 48px;
    border: 3px solid rgba(240,208,128,0.3);
    border-top-color: var(--gold-light);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .sending-text {
    color: var(--gold-light);
    font-size: 14px;
    letter-spacing: 0.1em;
  }
</style>
</head>
<body>

<header>
  <div class="shrine-mark">⛩</div>
  <div class="header-text">
    <h1>土津神社　勤怠管理</h1>
    <p>KOSHINTSU SHRINE · ATTENDANCE SYSTEM</p>
  </div>
</header>

<div class="clock-bar">
  <div class="clock-time" id="clockTime">--:--:--</div>
  <div class="clock-date" id="clockDate">----年--月--日（-）</div>
</div>

<main>
  <!-- 打刻パネル -->
  <div class="punch-panel" id="punchPanel">
    <div class="punch-selected-name">
      <span id="selectedName">　</span>　さん
    </div>
    <div class="punch-btns">
      <button class="punch-in" onclick="punch('出勤')">
        出勤
        <span class="punch-sub">CHECK IN</span>
      </button>
      <button class="punch-out" onclick="punch('退勤')">
        退勤
        <span class="punch-sub">CHECK OUT</span>
      </button>
    </div>
    <button class="cancel-btn" onclick="cancelSelection()">キャンセル</button>
  </div>

  <!-- 職員選択 -->
  <div class="section-label">職員を選択してください</div>
  <div class="staff-grid" id="staffGrid"></div>

  <!-- 打刻ログ -->
  <div class="section-label">本日の打刻記録</div>
  <div class="log-list" id="logList">
    <div class="log-item" style="color:#bbb;font-size:12px;justify-content:center;">まだ打刻がありません</div>
  </div>
</main>

<!-- 設定ボタン -->
<button class="settings-btn" onclick="openSettings()" title="設定">⚙</button>

<!-- 設定モーダル -->
<div class="modal-overlay" id="settingsModal">
  <div class="modal">
    <h2>⚙ システム設定</h2>
    <div class="form-group">
      <label>GAS ウェブアプリURL</label>
      <input type="url" id="gasUrl" placeholder="https://script.google.com/macros/s/.../exec">
    </div>
    <div class="form-group">
      <label>職員名（1行に1名）</label>
      <textarea id="staffNames" rows="8"></textarea>
    </div>
    <div class="modal-btns">
      <button class="btn-secondary" onclick="closeSettings()">閉じる</button>
      <button class="btn-primary" onclick="saveSettings()">保存</button>
    </div>
  </div>
</div>

<!-- 送信中 -->
<div class="sending-overlay" id="sendingOverlay">
  <div class="spinner"></div>
  <div class="sending-text">送信中…</div>
</div>

<!-- トースト -->
<div class="toast" id="toast"></div>

<script>
// ===== デフォルト設定 =====
const DEFAULT_STAFF = [
  "宮澤 友美",
  "職員B",
  "職員C",
  "職員D",
  "職員E"
];

// ===== 状態 =====
let config = {
  gasUrl: "",
  staffList: [...DEFAULT_STAFF]
};
let selectedStaff = null;
let todayLogs = [];

// ===== 初期化 =====
function init() {
  loadConfig();
  renderStaff();
  startClock();
}

function loadConfig() {
  const saved = localStorage.getItem("kintai_config");
  if (saved) {
    config = JSON.parse(saved);
  }
}

function saveConfig() {
  localStorage.setItem("kintai_config", JSON.stringify(config));
}

// ===== 時計 =====
const DAYS = ["日","月","火","水","木","金","土"];
function startClock() {
  function update() {
    const now = new Date();
    const h = String(now.getHours()).padStart(2,"0");
    const m = String(now.getMinutes()).padStart(2,"0");
    const s = String(now.getSeconds()).padStart(2,"0");
    document.getElementById("clockTime").textContent = `${h}:${m}:${s}`;
    const y = now.getFullYear();
    const mo = now.getMonth()+1;
    const d = now.getDate();
    const day = DAYS[now.getDay()];
    document.getElementById("clockDate").textContent = `${y}年${mo}月${d}日（${day}）`;
  }
  update();
  setInterval(update, 1000);
}

// ===== 職員グリッド =====
function renderStaff() {
  const grid = document.getElementById("staffGrid");
  grid.innerHTML = "";
  config.staffList.forEach(name => {
    if (!name.trim()) return;
    const lastLog = [...todayLogs].reverse().find(l => l.name === name);
    const statusText = lastLog ? `最終：${lastLog.type} ${lastLog.time}` : "未打刻";
    const statusClass = lastLog ? (lastLog.type === "出勤" ? "in" : "out") : "";
    const initial = name.trim()[0];
    const btn = document.createElement("button");
    btn.className = "staff-btn" + (selectedStaff === name ? " selected" : "");
    btn.innerHTML = `
      <div class="staff-avatar">${initial}</div>
      <div class="staff-name">${name}</div>
      <div class="staff-status ${statusClass}">${statusText}</div>
    `;
    btn.onclick = () => selectStaff(name);
    grid.appendChild(btn);
  });
}

// ===== 職員選択 =====
function selectStaff(name) {
  selectedStaff = name;
  document.getElementById("selectedName").textContent = name;
  document.getElementById("punchPanel").classList.add("active");
  renderStaff();
  document.getElementById("punchPanel").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function cancelSelection() {
  selectedStaff = null;
  document.getElementById("punchPanel").classList.remove("active");
  renderStaff();
}

// ===== 打刻 =====
async function punch(type) {
  if (!selectedStaff) return;
  if (!config.gasUrl) {
    showToast("⚠ GAS URLが設定されていません");
    return;
  }

  const name = selectedStaff;
  const now = new Date();
  const timeStr = `${String(now.getHours()).padStart(2,"0")}:${String(now.getMinutes()).padStart(2,"0")}`;

  // 送信中表示
  document.getElementById("sendingOverlay").classList.add("active");

  try {
    await fetch(config.gasUrl, {
      method: "POST",
      mode: "no-cors",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, type, timestamp: now.toISOString() })
    });

    // ローカルログ追加
    todayLogs.push({ name, type, time: timeStr });

    cancelSelection();
    addLogItem(name, type, timeStr);
    showToast(`✓ ${name}　${type}を記録しました`);

  } catch (err) {
    showToast("⚠ 送信に失敗しました。ネットワークを確認してください");
  } finally {
    document.getElementById("sendingOverlay").classList.remove("active");
  }
}

// ===== ログ表示 =====
function addLogItem(name, type, time) {
  const list = document.getElementById("logList");
  // 初期メッセージ削除
  const empty = list.querySelector("[style]");
  if (empty) empty.remove();

  const item = document.createElement("div");
  item.className = "log-item";
  const badgeClass = type === "出勤" ? "in" : "out";
  item.innerHTML = `
    <span class="log-badge ${badgeClass}">${type}</span>
    <span class="log-name">${name}</span>
    <span class="log-time">${time}</span>
  `;
  list.insertBefore(item, list.firstChild);

  renderStaff();
}

// ===== トースト =====
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), 3000);
}

// ===== 設定 =====
function openSettings() {
  document.getElementById("gasUrl").value = config.gasUrl;
  document.getElementById("staffNames").value = config.staffList.join("\n");
  document.getElementById("settingsModal").classList.add("active");
}

function closeSettings() {
  document.getElementById("settingsModal").classList.remove("active");
}

function saveSettings() {
  config.gasUrl = document.getElementById("gasUrl").value.trim();
  config.staffList = document.getElementById("staffNames").value
    .split("\n")
    .map(s => s.trim())
    .filter(Boolean);
  saveConfig();
  closeSettings();
  renderStaff();
  showToast("✓ 設定を保存しました");
}

// ===== 起動 =====
init();
</script>
</body>
</html>
